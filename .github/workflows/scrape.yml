name: Weekly Scraper

on:
  schedule:
    - cron: '0 2 * * 0' # Runs Weekly on Sunday at 2:00 AM
  workflow_dispatch: # Run manually button

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios cheerio xml2js

      - name: Run Scraper
        run: node scrape.js

      - name: Save JSON files back to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *-index.json || true
          git commit -m "Auto-update search indexes" || true
          git push || true
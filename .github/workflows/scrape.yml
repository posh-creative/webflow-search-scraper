name: Daily Scraper

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 2:00 AM
  workflow_dispatch: # Allows you to click a "Run Now" button

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives GitHub permission to save the new file

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: node scrape.js

      - name: Save JSON file back to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add search-index.json
          git commit -m "Auto-update search index" || echo "No changes to commit"
          git push
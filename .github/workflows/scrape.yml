name: Daily Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios cheerio xml2js

      - name: Run Scraper
        run: node scrape.js

      - name: Save JSON file back to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add search-index.json || true
          git commit -m "Auto-update search index" || true
          git push || true